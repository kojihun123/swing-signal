services:
  stock-signal:
    build: .
    container_name: stock-signal
    volumes:
      - ./src:/app/src                  # 코드 실시간 반영
      - ./data:/app/data                # 분석 결과 저장
      - ./watchlist.json:/app/watchlist.json  # 종목 리스트
      - ./industry_etf_map.json:/app/industry_etf_map.json  # ETF 매핑 테이블
      - ./.env:/app/.env:ro             # API 키 (읽기 전용)
    env_file:
      - .env
    environment:
      # 스케줄은 ET 앵커(.at(time, "America/New_York")) → 서머타임 자동 추종.
      # TZ는 알림 표시(now_notify) 및 schedule 로컬 환산 기준으로만 사용.
      - TZ=Asia/Seoul         # 알림 표시: 한국 시간
      - NOTIFY_TZ=Asia/Seoul  # 알림 표시 시간대
      - PYTHONUNBUFFERED=1     # 로그 즉시 출력
    restart: unless-stopped
